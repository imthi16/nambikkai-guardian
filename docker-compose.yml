name: nambikkai-guardian

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nambikkai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nambikkai}
      POSTGRES_USER: ${POSTGRES_USER:-nambikkai}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${S3_BUCKET}"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      S3_BUCKET: ${S3_BUCKET:-nambikkai-documents}
    restart: "no"
    security_opt:
      - no-new-privileges:true

  api:
    profiles: ["application"]
    build:
      context: ./apps/api
    environment:
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nambikkai}:${POSTGRES_PASSWORD:-nambikkai}@postgres:5432/${POSTGRES_DB:-nambikkai}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      REDIS_URL: redis://redis:6379/0
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_BUCKET: ${S3_BUCKET:-nambikkai-documents}
      S3_ENDPOINT: http://minio:9000
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  web:
    profiles: ["application"]
    build:
      context: ./apps/web
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://127.0.0.1:3000
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  minio_data:
  postgres_data:
  redis_data:
