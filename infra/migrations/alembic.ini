# Alembic configuration. Run from the repository root:
#   .venv-relative: apps/api/.venv/bin/alembic -c infra/migrations/alembic.ini upgrade head
# The database URL comes from DATABASE_URL or the application settings; it is
# never stored in this file.

[alembic]
script_location = %(here)s
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = apps/api

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
