name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: attest
          POSTGRES_PASSWORD: attest
          POSTGRES_DB: attest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U attest -d attest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install Tesseract (Tamil + English)
        run: sudo apt-get update -q && sudo apt-get install -y -q tesseract-ocr tesseract-ocr-tam
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minio -e MINIO_ROOT_PASSWORD=minio123 \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/live && break
            sleep 1
          done
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff format --check app tests
      - run: ruff check app tests
      - run: mypy
      - run: pytest

  web:
    name: Web quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  containers:
    name: Container validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - name: Start and verify local infrastructure
        run: make infra-up
      - name: Show healthy service status
        run: docker compose ps
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
      - uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: false
      - name: Stop local infrastructure
        if: always()
        run: make infra-down

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "apps/api[dev]"
      - run: pip-audit --skip-editable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm --prefix apps/web audit --audit-level=high

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t attest-api:scan apps/api
      - name: Build web image
        run: docker build -t attest-web:scan apps/web
      - name: Scan API image for OS and library vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: attest-api:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan web image for OS and library vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: attest-web:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
